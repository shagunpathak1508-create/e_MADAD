name: emadad
description: "eMADAD - Emergency Response & Volunteer Network"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.2
  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Location
  geolocator: ^13.0.4
  # Permissions
  permission_handler: ^11.4.0
  # Connectivity
  connectivity_plus: ^6.1.4
  # URL / SMS
  url_launcher: ^6.3.2
  # Storage
  shared_preferences: ^2.5.3
  # HTTP
  http: ^1.4.0
  # Charts
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
